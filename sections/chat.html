<!-- sections/chat.html -->
<section class="chat-section" data-aos="fade-up">
  <div class="container">
    <div class="section-heading center">
      <span class="eyebrow">Ask about me</span>
      <h2 class="section-title">Resume AI with portfolio context</h2>
      <p class="section-lede">
        Ask focused questions about my experience, project fit, technical strengths, or role alignment.
      </p>
    </div>

    <div class="chat-shell glass-card">
      <div class="status-badge">
        <span class="dot" aria-hidden="true"></span>
        Llama-4 Scout with resume context
      </div>

      <form id="chat-form" class="chat-form" action="javascript:void(0)" novalidate autocomplete="off">
        <label for="prompt" class="sr-only">Ask about my resume</label>
        <textarea id="prompt" rows="4" placeholder="Ask something like: Summarize Deva's strengths for a backend role in 2 lines."></textarea>

        <div class="chat-actions">
          <button id="send-btn" type="submit" class="btn-primary">Send</button>
          <button type="button" id="clear-chat" class="btn-secondary">Clear</button>

          <div class="model-wrap">
            <label for="model">Model</label>
            <select id="model" disabled>
              <option value="default" selected>Llama-4 Scout</option>
            </select>
          </div>
        </div>
      </form>

      <pre id="answer" class="chat-output"></pre>
    </div>
  </div>
</section>
